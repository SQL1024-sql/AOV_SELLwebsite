<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>每日上架 — 傳說對決</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans TC',system-ui,sans-serif;background:#07071A;color:#fff;min-height:100vh}
    .bg-grid{background-image:linear-gradient(rgba(255,215,0,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,215,0,.022) 1px,transparent 1px);background-size:52px 52px}
    .tg-gold{background:linear-gradient(135deg,#FFE57A,#FFD700,#FFA500);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    .inp{background:rgba(255,255,255,.06);border:1px solid rgba(255,215,0,.22);color:#fff;outline:none;transition:border-color .25s;border-radius:.6rem;width:100%;padding:.55rem .8rem;font-size:.875rem}
    .inp:focus{border-color:rgba(255,215,0,.6);box-shadow:0 0 0 3px rgba(255,215,0,.08)}
    .inp::placeholder{color:rgba(255,255,255,.28)}
    .btn{cursor:pointer;font-weight:700;border:none;transition:all .18s;border-radius:.6rem;padding:.55rem 1.2rem;font-size:.85rem}
    .btn-gold{background:linear-gradient(135deg,#FFD700,#FFA500);color:#07071A}
    .btn-gold:hover{opacity:.85;transform:translateY(-1px)}
    .btn-gold:disabled{opacity:.4;cursor:not-allowed;transform:none}
    .btn-red{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#f87171}
    .btn-red:hover{background:rgba(239,68,68,.28)}
    .btn-outline{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7)}
    .btn-outline:hover{background:rgba(255,255,255,.12)}
    .card{background:#0D0D26;border:1px solid rgba(255,255,255,.08);border-radius:.9rem;overflow:hidden;transition:border-color .2s}
    .card:hover{border-color:rgba(255,215,0,.2)}
    .drop-zone{border:2px dashed rgba(255,215,0,.25);border-radius:1rem;padding:3rem 2rem;text-align:center;cursor:pointer;transition:border-color .2s,background .2s}
    .drop-zone:hover,.drop-zone.over{border-color:rgba(255,215,0,.6);background:rgba(255,215,0,.04)}
    /* status badge */
    .badge-wait{background:rgba(255,255,255,.08);color:rgba(255,255,255,.45);border-radius:.35rem;padding:.15rem .5rem;font-size:.7rem;font-weight:700}
    .badge-ok{background:rgba(34,197,94,.15);color:#4ade80;border-radius:.35rem;padding:.15rem .5rem;font-size:.7rem;font-weight:700}
    .badge-err{background:rgba(239,68,68,.15);color:#f87171;border-radius:.35rem;padding:.15rem .5rem;font-size:.7rem;font-weight:700}
    .badge-ing{background:rgba(99,179,237,.15);color:#63B3ED;border-radius:.35rem;padding:.15rem .5rem;font-size:.7rem;font-weight:700}
    /* progress bar */
    #progressBar{height:6px;border-radius:3px;background:linear-gradient(90deg,#FFD700,#FFA500);transition:width .3s}
  </style>
</head>
<body class="bg-grid">

<!-- NAV -->
<nav style="background:rgba(7,7,26,.95);border-bottom:1px solid rgba(255,215,0,.1);position:sticky;top:0;z-index:50">
  <div style="max-width:900px;margin:0 auto;padding:.65rem 1rem;display:flex;align-items:center;gap:.75rem">
    <div style="width:2.1rem;height:2.1rem;border-radius:.55rem;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:900;background:linear-gradient(135deg,#FFD700,#7B2FBE)">⚔</div>
    <div class="tg-gold" style="font-weight:900;font-size:.9rem;flex:1">每日上架工具</div>
    <a href="index.html" class="btn btn-outline" style="text-decoration:none;font-size:.78rem">← 回前台</a>
    <a href="admin.html" class="btn btn-outline" style="text-decoration:none;font-size:.78rem">後台管理</a>
  </div>
</nav>

<main style="max-width:900px;margin:0 auto;padding:1.5rem 1rem 5rem">

  <!-- 步驟說明 -->
  <div style="display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap">
    <div style="flex:1;min-width:180px;background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.15);border-radius:.8rem;padding:.9rem 1rem">
      <div style="font-size:1.3rem;margin-bottom:.3rem">1️⃣</div>
      <div style="font-size:.82rem;font-weight:700;color:#FFD700">選擇圖片</div>
      <div style="font-size:.75rem;color:rgba(255,255,255,.45);margin-top:.2rem">一次選全部當天圖片</div>
    </div>
    <div style="flex:1;min-width:180px;background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.15);border-radius:.8rem;padding:.9rem 1rem">
      <div style="font-size:1.3rem;margin-bottom:.3rem">2️⃣</div>
      <div style="font-size:.82rem;font-weight:700;color:#FFD700">填寫價格</div>
      <div style="font-size:.75rem;color:rgba(255,255,255,.45);margin-top:.2rem">對照圖片輸入每張售價</div>
    </div>
    <div style="flex:1;min-width:180px;background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.15);border-radius:.8rem;padding:.9rem 1rem">
      <div style="font-size:1.3rem;margin-bottom:.3rem">3️⃣</div>
      <div style="font-size:.82rem;font-weight:700;color:#FFD700">一鍵上傳</div>
      <div style="font-size:.75rem;color:rgba(255,255,255,.45);margin-top:.2rem">清空舊資料並全部上傳</div>
    </div>
  </div>

  <!-- 拖曳上傳區 -->
  <div id="dropZone" class="drop-zone" onclick="document.getElementById('fileInput').click()"
       ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/gif,image/webp" multiple style="display:none" onchange="onFiles(event)"/>
    <div style="font-size:2.5rem;margin-bottom:.75rem">🖼️</div>
    <div style="font-weight:700;font-size:1rem;margin-bottom:.35rem">點擊或拖曳圖片到這裡</div>
    <div style="font-size:.8rem;color:rgba(255,255,255,.35)">支援 JPG、PNG、GIF、WebP，可一次選多張</div>
  </div>

  <!-- 圖片清單 -->
  <div id="listSection" style="display:none;margin-top:1.5rem">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:.5rem">
      <div style="font-weight:800;font-size:1rem">
        共 <span id="totalCount" style="color:#FFD700">0</span> 張圖片
        <span id="missingHint" style="font-size:.75rem;color:#f87171;margin-left:.5rem;display:none">⚠️ 有圖片未填價格</span>
      </div>
      <div style="display:flex;gap:.5rem">
        <button class="btn btn-outline" onclick="addMore()" style="font-size:.78rem">＋ 追加圖片</button>
        <button class="btn btn-outline" onclick="clearList()" style="font-size:.78rem;color:#f87171;border-color:rgba(239,68,68,.3)">✕ 清除全部</button>
      </div>
    </div>

    <!-- 圖片 grid -->
    <div id="imgGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.85rem"></div>

    <!-- 上傳按鈕 -->
    <div style="margin-top:1.5rem;padding:1.25rem;background:rgba(255,215,0,.05);border:1px solid rgba(255,215,0,.15);border-radius:.9rem">
      <div style="font-size:.82rem;color:rgba(255,255,255,.55);margin-bottom:.75rem">
        ⚠️ 點擊上傳後會 <strong style="color:#f87171">清空網站所有舊帳號</strong>，再上傳這批新圖片。
      </div>
      <button id="uploadBtn" class="btn btn-gold" onclick="startUpload()" style="width:100%;font-size:.95rem;padding:.75rem">
        🚀 清空舊資料並上傳
      </button>
    </div>
  </div>

  <!-- 進度區 -->
  <div id="progressSection" style="display:none;margin-top:1.5rem">
    <div style="display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:.4rem">
      <span id="progressText" style="color:rgba(255,255,255,.6)">準備中…</span>
      <span id="progressNum" style="color:#FFD700;font-weight:700">0 / 0</span>
    </div>
    <div style="background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-bottom:1rem">
      <div id="progressBar" style="width:0%;height:6px;border-radius:3px;background:linear-gradient(90deg,#FFD700,#FFA500);transition:width .3s"></div>
    </div>
    <div id="logList" style="display:flex;flex-direction:column;gap:.4rem;max-height:320px;overflow-y:auto"></div>
    <div id="doneMsg" style="display:none;text-align:center;padding:1.5rem;font-size:1rem;font-weight:800;color:#4ade80">🎉 上傳完成！</div>
  </div>

</main>

<script>
/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let items = []; // [{file, previewUrl, price}]

/* ═══════════════════════════════════════
   FILE INPUT
═══════════════════════════════════════ */
function onFiles(e) { addFiles(Array.from(e.target.files)); }
function addMore()  { document.getElementById('fileInput').click(); }

function addFiles(files) {
  const imgFiles = files.filter(f => /^image\//i.test(f.type));
  if (!imgFiles.length) return;
  imgFiles.forEach(f => {
    // avoid duplicates by name
    if (items.find(i => i.file.name === f.name)) return;
    const url = URL.createObjectURL(f);
    items.push({ file: f, previewUrl: url, price: '' });
  });
  renderGrid();
  document.getElementById('dropZone').style.display = 'none';
  document.getElementById('listSection').style.display = 'block';
}

/* drag & drop */
function onDragOver(e)  { e.preventDefault(); document.getElementById('dropZone').classList.add('over'); }
function onDragLeave()  { document.getElementById('dropZone').classList.remove('over'); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('over');
  addFiles(Array.from(e.dataTransfer.files));
}

/* ═══════════════════════════════════════
   RENDER GRID
═══════════════════════════════════════ */
function renderGrid() {
  const grid = document.getElementById('imgGrid');
  document.getElementById('totalCount').textContent = items.length;
  grid.innerHTML = '';

  items.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.cssText = 'position:relative';
    card.innerHTML = `
      <button onclick="removeItem(${idx})" title="移除"
        style="position:absolute;top:.4rem;right:.4rem;z-index:2;background:rgba(0,0,0,.65);border:none;color:#fff;border-radius:50%;width:1.6rem;height:1.6rem;cursor:pointer;font-size:.85rem;line-height:1.6rem;text-align:center">✕</button>
      <img src="${item.previewUrl}" loading="lazy" decoding="async" style="width:100%;aspect-ratio:4/3;object-fit:cover;display:block"/>
      <div style="padding:.6rem .7rem">
        <div style="font-size:.7rem;color:rgba(255,255,255,.35);margin-bottom:.35rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escH(item.file.name)}</div>
        <div style="position:relative">
          <span style="position:absolute;left:.65rem;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.35);font-size:.8rem;pointer-events:none">NT$</span>
          <input type="number" min="1" placeholder="輸入價格" value="${item.price}"
            oninput="setPrice(${idx}, this.value)"
            onkeydown="if(event.key==='Enter'){const next=document.querySelectorAll('.price-inp')[${idx}+1];if(next)next.focus()}"
            class="inp price-inp" style="padding-left:2.4rem;font-size:.88rem"/>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function setPrice(idx, val) { items[idx].price = val; checkMissing(); }
function removeItem(idx) {
  URL.revokeObjectURL(items[idx].previewUrl);
  items.splice(idx, 1);
  if (!items.length) clearList();
  else renderGrid();
}
function clearList() {
  items.forEach(i => URL.revokeObjectURL(i.previewUrl));
  items = [];
  document.getElementById('dropZone').style.display = 'block';
  document.getElementById('listSection').style.display = 'none';
  document.getElementById('progressSection').style.display = 'none';
}
function checkMissing() {
  const missing = items.some(i => !i.price || Number(i.price) <= 0);
  document.getElementById('missingHint').style.display = missing ? 'inline' : 'none';
}
function escH(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════
   UPLOAD
═══════════════════════════════════════ */
async function startUpload() {
  // Validate
  const invalid = items.filter(i => !i.price || Number(i.price) <= 0);
  if (invalid.length) {
    checkMissing();
    document.getElementById('missingHint').style.display = 'inline';
    alert(`還有 ${invalid.length} 張圖片沒有填價格！`);
    return;
  }
  if (!items.length) { alert('請先選擇圖片'); return; }

  document.getElementById('uploadBtn').disabled = true;
  document.getElementById('progressSection').style.display = 'block';
  document.getElementById('doneMsg').style.display = 'none';
  document.getElementById('logList').innerHTML = '';
  setProgress(0, items.length, '正在清除舊資料…');

  // Step 1: clear old accounts
  try {
    const res  = await fetch('/api/accounts');
    const old  = await res.json();
    for (const acc of old) {
      await fetch(`/api/accounts/${acc.id}`, { method: 'DELETE' });
    }
    addLog(`🗑️ 已清除 ${old.length} 筆舊資料`, 'info');
  } catch(e) {
    addLog('❌ 清除舊資料失敗：' + e.message, 'error');
    document.getElementById('uploadBtn').disabled = false;
    return;
  }

  // Step 2: upload new
  let done = 0;
  for (const item of items) {
    setProgress(done, items.length, `上傳中 ${item.file.name}…`);
    const fd = new FormData();
    fd.append('price', item.price);
    fd.append('image', item.file, item.file.name);
    try {
      const r = await fetch('/api/accounts', { method: 'POST', body: fd });
      if (r.ok) {
        addLog(`✅ ${item.file.name}  NT$ ${Number(item.price).toLocaleString('zh-TW')}`, 'ok');
      } else {
        const d = await r.json().catch(()=>({}));
        addLog(`❌ ${item.file.name} 失敗: ${d.error || r.status}`, 'error');
      }
    } catch(e) {
      addLog(`❌ ${item.file.name} 錯誤: ${e.message}`, 'error');
    }
    done++;
    setProgress(done, items.length, `上傳中…`);
  }

  setProgress(items.length, items.length, '完成！');
  document.getElementById('doneMsg').style.display = 'block';
  document.getElementById('uploadBtn').disabled = false;
}

function setProgress(done, total, text) {
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = text;
  document.getElementById('progressNum').textContent = `${done} / ${total}`;
}

function addLog(msg, type) {
  const colors = { ok: '#4ade80', error: '#f87171', info: '#63B3ED' };
  const el = document.createElement('div');
  el.style.cssText = `font-size:.78rem;color:${colors[type]||'#fff'};padding:.25rem .5rem;background:rgba(255,255,255,.04);border-radius:.35rem`;
  el.textContent = msg;
  const list = document.getElementById('logList');
  list.appendChild(el);
  list.scrollTop = list.scrollHeight;
}
</script>
</body>
</html>
