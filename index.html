/* =====================================================

/* =====================================================
   PERSISTENCE  — load from server API
   ===================================================== */
async function loadAccountsFromAPI() {
  try {
    const res = await fetch('/api/accounts');
    if (!res.ok) throw new Error();
    const data = await res.json();
    // Map server fields → frontend fields
    return data.map(acc => ({
      id:          acc.id,
      sellerId:    'admin',
      title:       acc.title || '',
      price:       acc.price,
      rank:        acc.rank || '其他',
      heroCount:   acc.heroCount  || 0,
      skinCount:   acc.skinCount  || 0,
      winRate:     acc.winRate    || '-',
      matches:     acc.matches    || 0,
      isNew:       acc.isNew      || false,
      sold:        acc.sold       || false,
      views:       acc.views      || 0,
      coverImage:  acc.imgNAME ? `/acc_img/${acc.imgNAME}` : 'https://placehold.co/800x600/0d0d26/ffd700?text=AOV',
      images:      acc.imgNAME ? [`/acc_img/${acc.imgNAME}`] : [],
      contact:     {},
      tags:        [],
    }));
  } catch(e) {
    // Fallback to default sample data if API unavailable
    return JSON.parse(JSON.stringify(DEFAULT_ACCOUNTS));
  }
}
function saveAccounts() {
  // No-op: data is managed by admin.html via API
}
let accountsData = JSON.parse(JSON.stringify(DEFAULT_ACCOUNTS));

/* =====================================================

const S = {
  page:'list',          // 'list' | 'detail' | 'admin'
  accountId:null,
  filterRank:'all',
  sortBy:'default',
  searchQuery:'',

  formId:null,          // id being edited
  formError:'',
  deleteConfirmId:null,
};

/* =====================================================
   UTILS
   ===================================================== */
function esc(s){if(typeof s!=='string')return String(s??'');return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function fmt(n){return Number(n).toLocaleString('zh-TW')}
function rankClass(r){return{傳說:'rk-legend',鑽石:'rk-diamond',宗師:'rk-master'}[r]||'rk-champ'}
function nextId(){return accountsData.length?Math.max(...accountsData.map(a=>a.id))+1:1}

function filteredList(){
  let items=[...accountsData];
  const q=S.searchQuery.toLowerCase();
  if(S.filterRank!=='all') items=items.filter(a=>a.rank===S.filterRank);
  if(q){
    const qn=Number(q);
    const isNum=q.trim()!==''&&!isNaN(qn)&&q.trim()!=='';
    items=items.filter(a=>(a.title||'').toLowerCase().includes(q)||(isNum&&a.price===qn));
  }
  const pMin=S.priceMin!==''?Number(S.priceMin):null;
  const pMax=S.priceMax!==''?Number(S.priceMax):null;
  if(pMin!==null&&!isNaN(pMin)) items=items.filter(a=>a.price>=pMin);
  if(pMax!==null&&!isNaN(pMax)) items=items.filter(a=>a.price<=pMax);
  if(S.sortBy==='default'){
    const maxPrice=Math.max(...items.map(a=>a.price),1);
    const maxViews=Math.max(...items.map(a=>a.views),1);
    items.sort((a,b)=>{
      const sa=(a.views/maxViews)*70 + (a.price/maxPrice)*30;
      const sb=(b.views/maxViews)*70 + (b.price/maxPrice)*30;
      return sb-sa;
    });
  }
  if(S.sortBy==='price-asc')  items.sort((a,b)=>a.price-b.price);
  if(S.sortBy==='price-desc') items.sort((a,b)=>b.price-a.price);
  if(S.sortBy==='skins-desc') items.sort((a,b)=>b.skinCount-a.skinCount);
  return items;
}

/* ── LIST PAGE ── */
const LIST_PER_PAGE = 40;

function renderListPage(){
  const items=filteredList();
  const avail=accountsData.filter(a=>!a.sold).length;
  const totalPages=Math.max(1,Math.ceil(items.length/LIST_PER_PAGE));
  if(S.listPage>totalPages) S.listPage=totalPages;
  const start=(S.listPage-1)*LIST_PER_PAGE;
  const pageItems=items.slice(start,start+LIST_PER_PAGE);

  const pgBtn=(label,p,disabled,active=false)=>
    `<button onclick="goListPage(${p})" style="min-width:2.1rem;height:2.1rem;padding:0 .6rem;border-radius:.45rem;font-size:.8rem;font-weight:700;cursor:${disabled?'default':'pointer'};border:1px solid ${active?'rgba(255,215,0,.6)':'rgba(255,255,255,.12)'};background:${active?'rgba(255,215,0,.15)':'rgba(255,255,255,.04)'};color:${active?'#FFD700':disabled?'rgba(255,255,255,.2)':'rgba(255,255,255,.65)'}" ${disabled?'disabled':''}>${label}</button>`;

  const buildPagination=()=>{
    if(totalPages<=1)return'';
    const parts=[];
    parts.push(pgBtn('‹',S.listPage-1,S.listPage===1));
    let lo=Math.max(1,S.listPage-2),hi=Math.min(totalPages,S.listPage+2);
    if(lo>1){parts.push(pgBtn('1',1,false,S.listPage===1));if(lo>2)parts.push(`<span style="color:rgba(255,255,255,.25);font-size:.82rem">…</span>`);}
    for(let i=lo;i<=hi;i++)parts.push(pgBtn(i,i,false,i===S.listPage));
    if(hi<totalPages){if(hi<totalPages-1)parts.push(`<span style="color:rgba(255,255,255,.25);font-size:.82rem">…</span>`);parts.push(pgBtn(totalPages,totalPages,false,S.listPage===totalPages));}
    parts.push(pgBtn('›',S.listPage+1,S.listPage===totalPages));
    return`<div style="display:flex;justify-content:center;align-items:center;gap:.4rem;padding:1.5rem 0 .5rem;flex-wrap:wrap">${parts.join('')}</div>
    <div style="text-align:center;font-size:.75rem;color:rgba(255,255,255,.28);margin-bottom:.5rem">第 ${S.listPage} / ${totalPages} 頁，共 ${items.length} 個帳號</div>`;
  };

  return `
  <div class="max-w-7xl mx-auto px-3 sm:px-4 pb-16">
    <div style="padding:1.4rem 0 .9rem;display:flex;flex-wrap:wrap;align-items:center;gap:.75rem">
      <div>
        <h1 class="tg-wg" style="font-size:1.4rem;font-weight:900;line-height:1.3">傳說對決 AOV · 帳號展示</h1>
        <p style="font-size:.78rem;color:rgba(255,255,255,.38);margin-top:.2rem">共 <strong style="color:#FFD700">${avail}</strong> 個帳號在售</p>
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:.75rem;padding-bottom:.9rem;border-bottom:1px solid rgba(255,255,255,.06)">
      <div style="display:flex;gap:.4rem;overflow-x:auto;flex:1" class="scrollbar-hide">
        ${[{k:'all',l:'全部',c:'all'}].map(f=>`
          <button onclick="setFilter('${f.k}')" class="fpill ${S.filterRank===f.k?`fp-active-${f.c}`:''}"> ${f.l}</button>
        `).join('')}
      </div>
      <select class="sort-sel" onchange="setSort(this.value)">
        <option value="default"    ${S.sortBy==='default'?'selected':''}>預設排序</option>
        <option value="price-asc"  ${S.sortBy==='price-asc'?'selected':''}>價格 低→高</option>
        <option value="price-desc" ${S.sortBy==='price-desc'?'selected':''}>價格 高→低</option>
      </select>
    </div>

    <div style="display:flex;align-items:center;gap:.5rem;padding:.6rem 0 .75rem;flex-wrap:wrap">
      <span style="font-size:.76rem;color:rgba(255,255,255,.4);flex-shrink:0">價格區間</span>
      <input type="number" min="0" placeholder="最低價" value="${esc(S.priceMin)}"
        oninput="S.priceMin=this.value;S.listPage=1"
        onchange="render()"
        onkeydown="if(event.key==='Enter')this.blur()"
        style="width:90px;background:rgba(255,255,255,.06);border:1px solid rgba(255,215,0,.22);color:#fff;outline:none;border-radius:.55rem;padding:.3rem .6rem;font-size:.78rem"/>
      <span style="color:rgba(255,255,255,.25);font-size:.82rem">—</span>
      <input type="number" min="0" placeholder="最高價" value="${esc(S.priceMax)}"
        oninput="S.priceMax=this.value;S.listPage=1"
        onchange="render()"
        onkeydown="if(event.key==='Enter')this.blur()"
        style="width:90px;background:rgba(255,255,255,.06);border:1px solid rgba(255,215,0,.22);color:#fff;outline:none;border-radius:.55rem;padding:.3rem .6rem;font-size:.78rem"/>
      ${(S.priceMin!==''||S.priceMax!=='')?`<button onclick="S.priceMin='';S.priceMax='';S.listPage=1;render()" style="font-size:.72rem;color:rgba(255,255,255,.35);background:none;border:none;cursor:pointer;padding:.2rem .4rem" onmouseover="this.style.color='#FFD700'" onmouseout="this.style.color='rgba(255,255,255,.35)'">✕ 清除</button>`:''}
    </div>

    ${(S.searchQuery||S.filterRank!=='all'||S.priceMin!==''||S.priceMax!=='')?`<div style="padding:.35rem 0 .55rem;font-size:.78rem;color:rgba(255,255,255,.38)">${S.searchQuery?`搜尋「<span style="color:#FFD700">${esc(S.searchQuery)}</span>」 `:''}${(S.priceMin!==''||S.priceMax!=='')?`價格 <span style="color:#FFD700">${S.priceMin||'0'} ~ ${S.priceMax||'∞'}</span> `:''}找到 <strong style="color:#fff">${items.length}</strong> 個帳號</div>`:''}

    ${items.length===0?`
      <div style="text-align:center;padding:6rem 0;color:rgba(255,255,255,.3)">
        <div style="font-size:3rem;margin-bottom:1rem">🔍</div>
        <div style="font-size:1rem;font-weight:600">找不到符合條件的帳號</div>
      </div>
    `:`
      <div class="pcard-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,210px),1fr));gap:.9rem;padding-top:.9rem">
        ${pageItems.map((a,i)=>renderProductCard(a,i)).join('')}
      </div>
      ${buildPagination()}
    `}
  </div>`;
}

  return `

    <div class="thumb-wrap">
      <img class="thumb" src="${esc(acc.coverImage)}" alt="${esc(acc.title)}" loading="${idx<4?'eager':'lazy'}" decoding="async" fetchpriority="${idx<2?'high':'auto'}" onload="this.classList.add('img-ready')" onerror="this.onerror=null;this.src='https://placehold.co/800x600/0d0d26/ffd700?text=AOV';this.classList.add('img-ready')"/>

  </div>`;
}

    </div>
  </div>`;
}

/* ── LOGIN MODAL ── */
function renderLoginModal(){
  return`
  <div class="modal-backdrop" onclick="closeLogin()">
    <div class="modal-box glass" style="width:100%;max-width:340px;padding:1.4rem;border-color:rgba(255,215,0,.28)" onclick="event.stopPropagation()">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.3rem">
        <h2 style="font-weight:900;font-size:1.05rem;background:linear-gradient(135deg,#FFD700,#B47FFF);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent">商家登入</h2>
        <button onclick="closeLogin()" style="font-size:1.6rem;color:rgba(255,255,255,.35);background:none;border:none;cursor:pointer;line-height:1">&times;</button>
      </div>
      <div style="display:flex;justify-content:center;margin-bottom:1.2rem">
        <div style="width:3.5rem;height:3.5rem;border-radius:.85rem;display:flex;align-items:center;justify-content:center;font-size:1.6rem;background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(123,47,190,.15));border:2px solid rgba(255,215,0,.25)">⚔</div>
      </div>
      ${S.loginError?`<div style="margin-bottom:.75rem;padding:.5rem .85rem;border-radius:.6rem;font-size:.77rem;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171">${esc(S.loginError)}</div>`:''}
      <div style="margin-bottom:.75rem">
        <label class="form-label">電子郵件</label>
        <input type="email" id="loginEmail" class="inp" placeholder="your@email.com"/>
      </div>
      <div style="margin-bottom:1rem">
        <label class="form-label">密碼</label>
        <input type="password" id="loginPassword" class="inp" placeholder="••••••••" onkeydown="if(event.key==='Enter')handleLogin()"/>
      </div>
      <button onclick="handleLogin()" style="width:100%;padding:.65rem;border-radius:.7rem;font-weight:900;font-size:.92rem;background:linear-gradient(135deg,#FFD700,#FFA500);color:#07071A;border:none;cursor:pointer;box-shadow:0 0 18px rgba(255,215,0,.28)" onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform=''">登入</button>
      <div style="text-align:center;margin-top:.9rem">
        <span style="font-size:.78rem;color:rgba(255,255,255,.35)">還沒有帳號？請聯繫管理員申請</span>
      </div>
    </div>
  </div>`;
}

/* ── LIGHTBOX ── */
function renderLightbox(){
  const acc=accountsData.find(a=>a.id===S.accountId);if(!acc)return'';
  const imgs=acc.images&&acc.images.length?acc.images:[acc.coverImage];
  const cur=imgs[S.activeImg];
  const hp=S.activeImg>0,hn=S.activeImg<imgs.length-1;
  return`
  <div class="modal-backdrop" onclick="closeLightbox()">
    <div class="modal-box" style="position:relative;width:100%;max-width:1000px;display:flex;flex-direction:column;align-items:center" onclick="event.stopPropagation()">
      <button onclick="closeLightbox()" style="position:absolute;top:-2.5rem;right:0;font-size:2rem;color:rgba(255,255,255,.4);background:none;border:none;cursor:pointer" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,.4)'">&times;</button>
      <img src="${esc(cur)}" style="max-height:88vh;max-width:100%;border-radius:.85rem;object-fit:contain;display:block" loading="eager" decoding="async" onerror="this.onerror=null;this.src='https://placehold.co/1000x750/0d0d26/ffd700?text=AOV'"/>
      ${imgs.length>1?`<div style="display:flex;align-items:center;gap:1rem;margin-top:.8rem">
        <button onclick="navImg(-1)" style="padding:.32rem 1rem;border-radius:.5rem;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:${hp?'#fff':'rgba(255,255,255,.2)'};cursor:${hp?'pointer':'default'};font-size:.82rem" ${!hp?'disabled':''}>← 上一張</button>
        <span style="font-size:.82rem;color:rgba(255,255,255,.35)">${S.activeImg+1} / ${imgs.length}</span>
        <button onclick="navImg(1)"  style="padding:.32rem 1rem;border-radius:.5rem;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:${hn?'#fff':'rgba(255,255,255,.2)'};cursor:${hn?'pointer':'default'};font-size:.82rem" ${!hn?'disabled':''}>下一張 →</button>
      </div>`:''}
    </div>
  </div>`;
}

/* ── FOOTER ── */
function renderFooter(){
  return`
  <footer>
    <div class="footer-inner">
      <div class="tg-gold" style="font-size:.85rem;font-weight:700">⚔ 傳說對決 帳號展示平台</div>
      <p class="copyright">© ${new Date().getFullYear()} AOV Account Shop · All rights reserved</p>
    </div>
  </footer>`;
}

/* =====================================================
   HANDLERS
   ===================================================== */
function attachEvents(){
  document.onkeydown=(e)=>{
    if(S.lightboxOpen){if(e.key==='ArrowLeft')navImg(-1);if(e.key==='ArrowRight')navImg(1);if(e.key==='Escape')closeLightbox();}
    else if(e.key==='Escape'){closeContact();closeLogin();closeForm();closeServiceModal();S.deleteConfirmId=null;}
  };
}

/* Navigation */
function goHome(){document.body.style.overflow='';history.pushState(null,'','#/');S.page='list';S.accountId=null;S.activeImg=0;S.lightboxOpen=false;S.contactOpen=false;window.scrollTo({top:0,behavior:'smooth'});render()}
function goDetail(id){document.body.style.overflow='';history.pushState(null,'',`#/account/${id}`);S.page='detail';S.accountId=id;S.activeImg=0;S.lightboxOpen=false;S.contactOpen=false;window.scrollTo({top:0,behavior:'smooth'});render()}
function goAdmin(){document.body.style.overflow='';history.pushState(null,'','#/admin');S.page='admin';window.scrollTo({top:0,behavior:'smooth'});render()}

/* List */
function handleSearch(v){S.searchQuery=v;S.searchInput=v;S.listPage=1;render()}
function setFilter(r){S.filterRank=r;S.listPage=1;render()}
function setPriceRange(min,max){S.priceMin=min;S.priceMax=max;S.listPage=1;render()}
function setSort(v){S.sortBy=v;S.listPage=1;render()}
function goListPage(p){S.listPage=p;window.scrollTo({top:0,behavior:'smooth'});render()}

/* Images */
function setActiveImg(i){
  S.activeImg=i;
  const img=document.getElementById('mainImg');
  if(img){const acc=accountsData.find(a=>a.id===S.accountId);if(acc){const imgs=acc.images&&acc.images.length?acc.images:[acc.coverImage];img.src=imgs[i]||imgs[0];}}
  render();
}
function openLightbox(){S.lightboxOpen=true;document.body.style.overflow='hidden';render()}
function closeLightbox(){S.lightboxOpen=false;document.body.style.overflow='';render()}
function navImg(dir){
  const acc=accountsData.find(a=>a.id===S.accountId);if(!acc)return;
  const imgs=acc.images&&acc.images.length?acc.images:[acc.coverImage];
  const n=S.activeImg+dir;if(n>=0&&n<imgs.length){S.activeImg=n;render();}
}

/* Contact */
function openContactModal(id){S.contactOpen=id;S.copied=false;document.body.style.overflow='hidden';render()}
function closeContact(){S.contactOpen=false;document.body.style.overflow='';render()}
function copyContact(text){
  const done=()=>{S.copied=true;render();setTimeout(()=>{S.copied=false;render();},2500)};
  navigator.clipboard.writeText(text).then(done).catch(()=>{const t=document.createElement('textarea');t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);done()});
}

/* Service Modals */
function openServiceModal(type){S.serviceModal=type;S.designStep='form';S.designError='';S.designSubmitting=false;document.body.style.overflow='hidden';render()}
function closeServiceModal(){S.serviceModal=null;S.designStep='form';document.body.style.overflow='';render()}
function togglePwVis(){
  const inp=document.getElementById('dsGamePw');
  const btn=document.getElementById('pwToggleBtn');
  if(!inp)return;
  inp.type=inp.type==='password'?'text':'password';
  if(btn)btn.textContent=inp.type==='password'?'👁':'🙈';
}
async function submitDesign(){
  const g=id=>document.getElementById(id)?.value?.trim()||'';
  const gameAccount=g('dsGameAcc'),gamePassword=g('dsGamePw'),contact=g('dsContact'),note=g('dsNote');
  const bindType=document.getElementById('dsBindType')?.value||'';
  if(!gameAccount||!gamePassword||!bindType||!contact){S.designError='請填寫所有必填欄位';render();return}
  S.designSubmitting=true;S.designError='';render();
  try{
    const res=await fetch('/api/submissions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'design',gameAccount,gamePassword,bindType,contact,note})});
    if(res.ok){S.designStep='done';}
    else{const d=await res.json().catch(()=>({}));S.designError=d.error||'送出失敗，請稍後再試';}
  }catch(e){S.designError='連線失敗，請稍後再試';}
  S.designSubmitting=false;render();
}

/* Login */
function openLogin(){S.loginOpen=true;S.loginError='';document.body.style.overflow='hidden';render()}
function closeLogin(){S.loginOpen=false;document.body.style.overflow='';render()}
function handleLogin(){
  const e=document.getElementById('loginEmail')?.value||'';
  const p=document.getElementById('loginPassword')?.value||'';
  if(!e||!p){S.loginError='請填寫電子郵件和密碼';render();return}
  if(!e.includes('@')){S.loginError='請輸入有效的電子郵件';render();return}
  if(p.length<6){S.loginError='密碼至少需要 6 個字元';render();return}
  /* TODO: const {data,error}=await supabase.auth.signInWithPassword({email:e,password:p}) */
  const name=e.split('@')[0];
  S.isLoggedIn=true;S.currentUser={name,email:e,id:e};
  S.loginOpen=false;S.loginError='';document.body.style.overflow='';
  goAdmin();
}
function handleLogout(){S.isLoggedIn=false;S.currentUser=null;goHome()}

/* Admin: Add / Edit form */
function openFormAdd(){S.formOpen=true;S.formMode='add';S.formId=null;S.formError='';document.body.style.overflow='hidden';render()}
function openFormEdit(id){S.formOpen=true;S.formMode='edit';S.formId=id;S.formError='';document.body.style.overflow='hidden';render()}
function closeForm(){S.formOpen=false;document.body.style.overflow='';render()}

function submitForm(){
  const g=id=>document.getElementById(id)?.value?.trim()||'';
  const title=g('f_title'),price=parseInt(g('f_price')||'0'),rank=g('f_rank'),skinCount=parseInt(g('f_skinCount')||'0'),cover=g('f_cover');
  if(!title){S.formError='請填寫帳號標題';render();return}
  if(!price||price<1){S.formError='請填寫有效的售價';render();return}
  if(!skinCount&&skinCount!==0){S.formError='請填寫造型數';render();return}
  if(!cover){S.formError='請填寫封面圖片網址';render();return}

  const imagesRaw=g('f_images');
  const images=imagesRaw?imagesRaw.split('\n').map(s=>s.trim()).filter(Boolean):[cover];
  if(!images.includes(cover))images.unshift(cover);
  const tags=[];

  const data={
    title,price,rank,
    rankClass:rankClass(rank),
    heroCount:parseInt(g('f_heroCount')||'0'),
    skinCount,
    winRate:g('f_winRate')||'-',
    matches:parseInt(g('f_matches')||'0'),
    coverImage:cover,
    images,
    tags,
    isNew:document.getElementById('f_isNew')?.checked||false,
    sold:document.getElementById('f_sold')?.checked||false,
    contact:{},
    sellerId:S.currentUser?.id||'demo',
  };

  if(S.formMode==='add'){
    accountsData.push({...data,id:nextId(),views:0});
  } else {
    const idx=accountsData.findIndex(a=>a.id===S.formId);
    if(idx!==-1) accountsData[idx]={...accountsData[idx],...data};
  }
  saveAccounts();
  S.formOpen=false;S.formError='';document.body.style.overflow='';render();
}

/* Admin: Toggle sold */
function toggleSold(id){
  const acc=accountsData.find(a=>a.id===id);if(!acc)return;
  acc.sold=!acc.sold;saveAccounts();render();
}

/* Admin: Delete */
function confirmDelete(id){S.deleteConfirmId=id;render()}
function deleteAccount(id){
  accountsData=accountsData.filter(a=>a.id!==id);
  saveAccounts();S.deleteConfirmId=null;render();
}

/* =====================================================
   ROUTER + INIT
   ===================================================== */
window.addEventListener('popstate',()=>{
  document.body.style.overflow='';
  S.lightboxOpen=false;S.contactOpen=false;
  const h=location.hash;
  if(h.startsWith('#/account/')){const id=parseInt(h.replace('#/account/',''));if(!isNaN(id)){S.page='detail';S.accountId=id;S.activeImg=0;}}
  else if(h==='#/admin'){S.page='admin';}
  else{S.page='list';S.accountId=null;}
  window.scrollTo({top:0,behavior:'smooth'});
  render();
});

(async()=>{
  const h=location.hash;
  if(h.startsWith('#/account/')){const id=parseInt(h.replace('#/account/',''));if(!isNaN(id)){S.page='detail';S.accountId=id;}}
  else if(h==='#/admin'){S.page='admin';}
  render(); // render immediately with default data
  accountsData = await loadAccountsFromAPI();
  render(); // re-render with real data from API
})();
</script>
