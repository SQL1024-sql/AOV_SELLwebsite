  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans TC',system-ui,sans-serif;background:#07071A;color:#fff;min-height:100vh;display:flex;flex-direction:column}
    .bg-grid{background-image:linear-gradient(rgba(255,215,0,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,215,0,.022) 1px,transparent 1px);background-size:52px 52px}
    .glass{background:rgba(255,255,255,.045);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,215,0,.12);border-radius:1rem}
    .glass-dark{background:rgba(7,7,26,.9);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px)}
    .tg-gold{background:linear-gradient(135deg,#FFE57A,#FFD700,#FFA500);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    .tg-wg{background:linear-gradient(135deg,#fff 0%,#FFD700 60%,#B47FFF 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

    /* ── Product card ── */
    .pcard{background:#0D0D26;border-radius:1rem;overflow:hidden;cursor:pointer;transition:transform .28s,box-shadow .28s;border:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;position:relative}
    .pcard:hover{transform:translateY(-5px);box-shadow:0 16px 45px rgba(255,215,0,.15);border-color:rgba(255,215,0,.3)}
    .pcard .thumb{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;transition:transform .45s,opacity .35s;opacity:0}
    .pcard .thumb.img-ready{opacity:1}
    .pcard:hover .thumb{transform:scale(1.05)}
    .pcard .thumb-wrap{overflow:hidden;position:relative;flex-shrink:0;background:#12122a}

    /* ── Shimmer ── */
    .shimmer{position:relative}
    .shimmer::after{content:'';position:absolute;inset:0;background:linear-gradient(110deg,rgba(255,215,0,0) 20%,rgba(255,215,0,.2) 50%,rgba(255,215,0,0) 80%);background-size:200% 100%;animation:shimmer 3s linear infinite;pointer-events:none;border-radius:inherit;z-index:2}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

    /* ── Rank colours ── */
    .rk-legend {background:rgba(255,215,0,.15); color:#FFD700;border:1px solid rgba(255,215,0,.45)}
    .rk-diamond{background:rgba(99,179,237,.15);color:#63B3ED;border:1px solid rgba(99,179,237,.4)}
    .rk-master {background:rgba(180,127,255,.15);color:#B47FFF;border:1px solid rgba(180,127,255,.4)}
    .rk-champ  {background:rgba(252,129,74,.15); color:#FC814A;border:1px solid rgba(252,129,74,.4)}

    /* ── Filter pills ── */
    .fpill{flex-shrink:0;padding:.3rem .85rem;border-radius:999px;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .18s;border:none;outline:none}
    .fp-active-legend {background:rgba(255,215,0,.2); color:#FFD700;box-shadow:0 0 12px rgba(255,215,0,.25)}
    .fp-active-diamond{background:rgba(99,179,237,.2);color:#63B3ED}
    .fp-active-master {background:rgba(180,127,255,.2);color:#B47FFF}
    .fp-active-all    {background:rgba(255,255,255,.12);color:#fff}
    .fpill:not([class*=fp-active]){background:rgba(255,255,255,.05);color:rgba(255,255,255,.45)}
    .fpill:not([class*=fp-active]):hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8)}

    /* ── Inputs ── */
    .inp{background:rgba(255,255,255,.06);border:1px solid rgba(255,215,0,.22);color:#fff;outline:none;transition:border-color .25s;border-radius:.7rem;width:100%;padding:.65rem .9rem;font-size:.875rem}
    .inp:focus{border-color:rgba(255,215,0,.55)}
    .inp::placeholder{color:rgba(255,255,255,.28)}
    select.inp{cursor:pointer}
    select.inp option{background:#0D0D26}
    textarea.inp{resize:vertical;min-height:80px;font-family:inherit}

    .search-bar{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,215,0,.25);border-radius:.75rem;color:#fff;outline:none;transition:border-color .22s,box-shadow .22s;font-size:.875rem;width:100%;padding:.52rem 1rem .52rem 2.3rem}
    .search-bar:focus{border-color:rgba(255,215,0,.55);box-shadow:0 0 0 3px rgba(255,215,0,.08)}
    .search-bar::placeholder{color:rgba(255,255,255,.3)}

    select.sort-sel{background:rgba(255,255,255,.06);border:1px solid rgba(255,215,0,.2);color:rgba(255,255,255,.7);font-size:.78rem;border-radius:.55rem;padding:.3rem .65rem;outline:none;cursor:pointer}
    select.sort-sel option{background:#0D0D26}

    nav{position:sticky;top:0;z-index:50}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:#07071A}
    ::-webkit-scrollbar-thumb{background:linear-gradient(#FFD700,#7B2FBE);border-radius:3px}
    .scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}
    .scrollbar-hide::-webkit-scrollbar{display:none}

    @keyframes pulseGlow{0%,100%{box-shadow:0 0 14px rgba(255,215,0,.35)}50%{box-shadow:0 0 34px rgba(255,215,0,.65)}}
    .pulse-glow{animation:pulseGlow 2.5s ease-in-out infinite}

    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(5px);z-index:70;display:flex;align-items:center;justify-content:center;padding:1rem;animation:fadeIn .17s ease;overflow-y:auto}
    .modal-box{animation:slideUp .2s ease;max-height:90vh;overflow-y:auto}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}

    .img-thumb{width:70px;height:50px;object-fit:cover;border-radius:.45rem;cursor:pointer;flex-shrink:0;border:2px solid rgba(255,255,255,.1);transition:border-color .18s,transform .18s}
    .img-thumb.active,.img-thumb:hover{border-color:#FFD700;transform:scale(1.07)}
    .detail-main-img{width:100%;display:block;border-radius:.85rem;cursor:zoom-in;aspect-ratio:16/9;object-fit:cover;max-height:260px}

    .stat-row{display:flex;align-items:center;justify-content:space-between;padding:.55rem 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:.875rem}
    .stat-row:last-child{border-bottom:none}
    .breadcrumb a{color:rgba(255,255,255,.4);font-size:.78rem;cursor:pointer;text-decoration:none}
    .breadcrumb a:hover{color:#FFD700}
    .breadcrumb span{color:rgba(255,255,255,.25);font-size:.78rem;margin:0 .35rem}

    /* ── Admin ── */
    .admin-card{background:#0D0D26;border:1px solid rgba(255,255,255,.08);border-radius:.9rem;padding:1rem;display:flex;gap:.85rem;align-items:flex-start;transition:border-color .2s}
    .admin-card:hover{border-color:rgba(255,215,0,.25)}
    .admin-thumb{width:90px;height:68px;object-fit:cover;border-radius:.55rem;flex-shrink:0}
    .btn{cursor:pointer;font-weight:700;border:none;transition:all .18s;border-radius:.6rem;padding:.45rem .9rem;font-size:.78rem}
    .btn-gold{background:linear-gradient(135deg,#FFD700,#FFA500);color:#07071A}
    .btn-gold:hover{opacity:.85}
    .btn-outline{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.65)}
    .btn-outline:hover{background:rgba(255,255,255,.12)}
    .btn-red{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#f87171}
    .btn-red:hover{background:rgba(239,68,68,.25)}
    .btn-green{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#4ade80}
    .form-label{font-size:.78rem;color:rgba(255,255,255,.5);display:block;margin-bottom:.3rem}
    .form-group{margin-bottom:.85rem}

    .tab-btn{padding:.55rem 1.1rem;font-size:.82rem;font-weight:600;cursor:pointer;border:none;background:none;color:rgba(255,255,255,.4);border-bottom:2px solid transparent;transition:all .18s}
    .tab-btn.active{color:#FFD700;border-bottom-color:#FFD700}
    .tab-btn:hover:not(.active){color:rgba(255,255,255,.75)}

    /* ── Footer ── */
    footer{background:rgba(7,7,26,.97);border-top:1px solid rgba(255,215,0,.1);padding:1.5rem 1rem;text-align:center;margin-top:auto}
    footer .footer-inner{max-width:1200px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:.5rem}
    footer .copyright{font-size:.78rem;color:rgba(255,255,255,.3)}

    /* ── Responsive ── */
    #detailGrid{grid-template-columns:1fr}
    @media(min-width:768px){
      #detailGrid{grid-template-columns:55% 1fr}
    }
    @media(max-width:640px){
      .pcard-grid{grid-template-columns:repeat(2,1fr)!important;gap:.5rem!important}
      #detailGrid{grid-template-columns:1fr!important}
      .detail-price{font-size:1.5rem!important}
      .nav-title{display:none}
      .modal-box{margin:.5rem;width:calc(100vw - 1rem)!important;max-width:100%!important}
      footer{padding:1rem .75rem}
      /* Nav: 搜尋欄換行到第二行 */
      .nav-main-row{flex-wrap:wrap!important;padding-bottom:.45rem!important}
      .nav-search-wrap{order:10;width:100%;max-width:100%!important;margin:0 0 .15rem!important}
      /* 聯繫按鈕只顯示 emoji */
      .nav-contact-text{display:none}
      /* 導覽按鈕縮小 padding */
      .nav-action-btn{padding:.38rem .55rem!important}
      /* Form modal: 單欄排列 */
      .form-grid-2{grid-template-columns:1fr!important}
      /* 後台操作按鈕：2×2 排列 */
      .admin-actions{flex-direction:row!important;flex-wrap:wrap!important;flex-shrink:1!important;min-width:0!important;width:auto}
      .admin-actions .btn{flex:1 1 calc(50% - .2rem);min-width:0;text-align:center;padding:.3rem .25rem!important;font-size:.68rem!important}
      /* 後台卡片縮圖縮小 */
      .admin-thumb{width:70px!important;height:52px!important}
      /* 觸控目標 */
      .fpill{min-height:36px;display:inline-flex;align-items:center}
      .sort-sel{min-height:36px}
      /* 詳情頁面 */
      .detail-main-img{border-radius:.55rem!important}
      .img-thumb{width:58px!important;height:42px!important}
    }
    @media(max-width:400px){
      .pcard-grid{grid-template-columns:1fr!important}
      .admin-actions .btn{flex:1 1 100%}
    }
  </style>

<body class="bg-grid">
<noscript><div style="text-align:center;padding:4rem 1rem;color:#fff;font-size:1.1rem">此網站需要啟用 JavaScript 才能正常使用。請在瀏覽器設定中啟用 JavaScript。</div></noscript>
<div id="app"></div>

<script>
/* =====================================================
   DEFAULT DATA  (fallback when localStorage is empty)
   Future: load from Supabase
   ===================================================== */
const DEFAULT_ACCOUNTS = [];

/* =====================================================
   GLOBAL CONTACT INFO
   ===================================================== */

/* =====================================================
   PERSISTENCE  — load from server API
   ===================================================== */
async function loadAccountsFromAPI() {
  try {
    const res = await fetch('/api/accounts');
    if (!res.ok) throw new Error();
    const data = await res.json();
    // Map server fields → frontend fields
    return data.map(acc => ({
      id:          acc.id,
      sellerId:    'admin',
      title:       acc.title || '',
      price:       acc.price,
      game:        acc.game  || 'AOV',
      rank:        acc.rank || '其他',
      heroCount:   acc.heroCount  || 0,
      skinCount:   acc.skinCount  || 0,
      winRate:     acc.winRate    || '-',
      matches:     acc.matches    || 0,
      isNew:       acc.isNew      || false,
      sold:        acc.sold       || false,
      views:       acc.views      || 0,
      coverImage:  (acc.imgNAMEs?.length ? acc.imgNAMEs[0] : acc.imgNAME) ? `/acc_img/${acc.imgNAMEs?.length ? acc.imgNAMEs[0] : acc.imgNAME}` : 'https://placehold.co/800x600/0d0d26/ffd700?text=AOV',
      images:      acc.imgNAMEs?.length ? acc.imgNAMEs.map(n => `/acc_img/${n}`) : (acc.imgNAME ? [`/acc_img/${acc.imgNAME}`] : []),
      contact:     {},
      tags:        [],
    }));
  } catch(e) {
    return [];
  }
}
function saveAccounts() {
  // No-op: data is managed by admin.html via API
}
let accountsData = JSON.parse(JSON.stringify(DEFAULT_ACCOUNTS));

/* =====================================================
   STATE
   ===================================================== */
const S = {
  maintenance: { spotAccount: false, sellAccount: false, design: false },
  page:'home',          // 'home' | 'list' | 'detail' | 'admin' | 'design'
  accountId:null,
  filterRank:'all',
  filterGame:'all',
  sortBy:'default',
  searchQuery:'',
  searchInput:'',
  priceMin:'',
  priceMax:'',
  listPage:1,           // current page on list view
  activeImg:0,
  lightboxOpen:false,
  contactOpen:false,    // which account id, or null for generic
  isLoading:true,
  copied:false,
  // services
  serviceModal: null,   // null | 'buy' | 'design'
  designStep: 'form',   // 'form' | 'done'
  designError: '',
  designSubmitting: false,
  designConfirmOpen: false,
  designOrderNo: '',
  _dsFormData: { gameAccount:'', gamePassword:'', bindType:'', contact:'', note:'' },
  // bug report
  bugReportOpen: false,
  bugReportStep: 'form',  // 'form' | 'done'
  bugReportError: '',
  bugReportSubmitting: false,
  deleteConfirmId:null,
};

/* =====================================================
   UTILS
   ===================================================== */
function esc(s){if(typeof s!=='string')return String(s??'');return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function fmt(n){return Number(n).toLocaleString('zh-TW')}
function rankClass(r){return{傳說:'rk-legend',鑽石:'rk-diamond',宗師:'rk-master'}[r]||'rk-champ'}

/* ── GAMES DEFINITION ── */
const GAMES = [
  { key:'AOV',        label:'傳說對決',  emoji:'⚔️',  color:'#FFD700' },
  { key:'PUBG',       label:'PUBG',       emoji:'🔫',  color:'#E8B84B' },
  { key:'COD',        label:'決勝時刻',  emoji:'💣',  color:'#78A04A' },
  { key:'BrawlStars', label:'荒野亂鬥',  emoji:'🌟',  color:'#7B68EE' },
  { key:'SpeedDrift', label:'極速領域',  emoji:'🏎️', color:'#00CED1' },
  { key:'FreeFire',   label:'Free Fire', emoji:'🔥',  color:'#FF6B35' },
];
function getGame(key){ return GAMES.find(g=>g.key===key)||GAMES[0]; }
function nextId(){return accountsData.length?Math.max(...accountsData.map(a=>a.id))+1:1}

function filteredList(){
  let items=[...accountsData];
  const q=S.searchQuery.toLowerCase();
  if(S.filterGame!=='all') items=items.filter(a=>(a.game||'AOV')===S.filterGame);
  if(S.filterRank!=='all') items=items.filter(a=>a.rank===S.filterRank);
  if(q){
    const qn=Number(q);
    const isNum=q.trim()!==''&&!isNaN(qn)&&q.trim()!=='';
    items=items.filter(a=>(a.title||'').toLowerCase().includes(q)||(isNum&&a.price===qn));
  }
  const pMin=S.priceMin!==''?Number(S.priceMin):null;
  const pMax=S.priceMax!==''?Number(S.priceMax):null;
  if(pMin!==null&&!isNaN(pMin)) items=items.filter(a=>a.price>=pMin);
  if(pMax!==null&&!isNaN(pMax)) items=items.filter(a=>a.price<=pMax);
  if(S.sortBy==='default'){
    const maxPrice=Math.max(...items.map(a=>a.price),1);
    const maxViews=Math.max(...items.map(a=>a.views),1);
    items.sort((a,b)=>{
      const sa=(a.views/maxViews)*70 + (a.price/maxPrice)*30;
      const sb=(b.views/maxViews)*70 + (b.price/maxPrice)*30;
      return sb-sa;
    });
  }
  if(S.sortBy==='price-asc')  items.sort((a,b)=>a.price-b.price);
  if(S.sortBy==='price-desc') items.sort((a,b)=>b.price-a.price);
  if(S.sortBy==='newest')     items.sort((a,b)=>b.id-a.id);
  return items;
}

/* =====================================================
   RENDER
   ===================================================== */
function render(){
  document.getElementById('app').innerHTML=
    renderNav()+
    (S.isLoading          ? renderLoadingState() :
     S.page==='home'      ? renderHomePage()     :
     S.page==='list'      ? renderListPage()     :
     S.page==='detail'    ? renderDetailPage()   :
     S.page==='design'    ? renderDesignPage()   : '')+
    renderFooter()+
    (S.contactOpen!==false   ? renderContactModal()  : '')+
    (S.serviceModal           ? renderServiceModal()  : '')+
    (S.lightboxOpen          ? renderLightbox()      : '')+
    (S.deleteConfirmId!==null? renderDeleteConfirm() : '')+
    (S.designConfirmOpen     ? renderDesignConfirmModal() : '')+
    (S.bugReportOpen         ? renderBugReportModal()    : '');
  attachEvents();
}

function renderLoadingState(){
  return `
  <div style="max-width:80rem;margin:0 auto;padding:4rem 1rem;text-align:center;min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center">
    <div style="width:2.5rem;height:2.5rem;border:3px solid rgba(255,215,0,.2);border-top-color:#FFD700;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:1.5rem"></div>
    <div style="font-size:.95rem;color:rgba(255,255,255,.5)">載入中…</div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  </div>`;
}

/* ── NAV ── */
function renderNav(){
  return `
  <nav class="glass-dark" style="border-bottom:1px solid rgba(255,215,0,.1)">
    <div class="nav-main-row" style="max-width:80rem;margin:0 auto;padding:.65rem 1rem;display:flex;align-items:center;gap:.75rem">
      <button onclick="goHome()" style="display:flex;align-items:center;gap:.55rem;background:none;border:none;cursor:pointer;flex-shrink:0">
        <div style="width:2.1rem;height:2.1rem;border-radius:.55rem;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:900;background:linear-gradient(135deg,#FFD700,#7B2FBE)">🎮</div>
        <div class="nav-title" style="text-align:left;line-height:1.25">
          <div class="tg-gold" style="font-weight:900;font-size:.85rem">遊戲帳號</div>
        </div>
      </button>

      <div class="nav-search-wrap" style="flex:1;position:relative;max-width:480px;margin:0 auto">
        <svg style="position:absolute;left:.75rem;top:50%;transform:translateY(-50%);width:.9rem;height:.9rem;pointer-events:none;color:rgba(255,255,255,.32)" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input type="text" class="search-bar" id="searchInput" placeholder="搜尋價格" value="${esc(S.searchInput)}" oninput="S.searchInput=this.value" onkeydown="if(event.key==='Enter')handleSearch(this.value)" style="padding-right:2.8rem"/>
        <button onclick="handleSearch(document.getElementById('searchInput').value)" style="position:absolute;right:.4rem;top:50%;transform:translateY(-50%);background:rgba(255,215,0,.2);border:1px solid rgba(255,215,0,.35);color:#FFD700;border-radius:.5rem;padding:.22rem .55rem;cursor:pointer;font-size:.75rem;font-weight:700">搜尋</button>
      </div>

      <button onclick="openServiceModal('buy')" class="nav-action-btn" style="flex-shrink:0;display:flex;align-items:center;gap:.3rem;padding:.38rem .7rem;border-radius:.6rem;font-size:.75rem;font-weight:700;background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.2);color:rgba(255,215,0,.8);cursor:pointer" onmouseover="this.style.borderColor='rgba(255,215,0,.5)';this.style.color='#FFD700'" onmouseout="this.style.borderColor='rgba(255,215,0,.2)';this.style.color='rgba(255,215,0,.8)'">
        💰 賣帳號
      </button>

function saveDsFormData(){
  const g=id=>document.getElementById(id)?.value?.trim()||'';
  const pw=document.getElementById('dsGamePw')?.value||'';
  const bindType=document.getElementById('dsBindType')?.value||'';
  const d={gameAccount:g('dsGameAcc'),gamePassword:pw,bindType,contact:g('dsContact'),note:g('dsNote')};
  S._dsFormData=d;
  try{sessionStorage.setItem('_dsForm',JSON.stringify(d));}catch(e){}
}
function restoreDsFormData(){
  try{const s=sessionStorage.getItem('_dsForm');if(s)S._dsFormData=JSON.parse(s);}catch(e){}
}
function clearDsFormData(){
  S._dsFormData={gameAccount:'',gamePassword:'',bindType:'',contact:'',note:''};
  _dsBindImg=null;_dsBindImgUrl=null;
  try{sessionStorage.removeItem('_dsForm');}catch(e){}
}
function handleBindImgChange(input){
  const file=input.files[0];
  if(!file)return;
  if(file.size>5*1024*1024){alert('圖片大小不能超過 5MB');input.value='';return;}
  saveDsFormData();
  _dsBindImg=file;
  const reader=new FileReader();
  reader.onload=e=>{
    _dsBindImgUrl=e.target.result;
    const thumb=document.getElementById('dsBindImgThumb');
    const preview=document.getElementById('dsBindImgPreview');
    const ph=document.getElementById('dsBindImgPlaceholder');
    if(thumb){thumb.src=_dsBindImgUrl;thumb.style.display='block';}
    if(preview)preview.style.display='block';
    if(ph)ph.style.display='none';
  };
  reader.readAsDataURL(file);
}

function submitDesign(){
  const g=id=>document.getElementById(id)?.value?.trim()||'';
  const gameAccount=g('dsGameAcc'),gamePassword=g('dsGamePw'),contact=g('dsContact'),note=g('dsNote');
  const bindType=document.getElementById('dsBindType')?.value||'';
  // Save form state before any render so values survive re-render
  S._dsFormData={gameAccount,gamePassword,bindType,contact,note};
  if(!gameAccount||!gamePassword||!bindType||!contact){
    const m=[];
    if(!gameAccount)m.push('遊戲帳號');
    if(!gamePassword)m.push('遊戲密碼');
    if(!bindType)m.push('綁定方式');
    if(!contact)m.push('聯繫方式');
    S.designError='請填寫以下必填欄位：'+m.join('、');
    render();return;
  }
  S.designError='';
  S.designConfirmOpen=true;
  render();
}

async function doSubmitDesign(){
  const {gameAccount,gamePassword,bindType,contact,note}=S._dsFormData;
  S.designSubmitting=true;S.designConfirmOpen=false;render();
  try{
    let body,headers={};
    if(_dsBindImg){
      const fd=new FormData();
      fd.append('type','design');fd.append('gameAccount',gameAccount);fd.append('gamePassword',gamePassword);
      fd.append('bindType',bindType);fd.append('contact',contact);fd.append('note',note);
      fd.append('bindImg',_dsBindImg);
      body=fd;
    }else{
      headers={'Content-Type':'application/json'};
      body=JSON.stringify({type:'design',gameAccount,gamePassword,bindType,contact,note});
    }
    const res=await fetch('/api/submissions',{method:'POST',headers,body});
    if(res.ok){
      const d=await res.json().catch(()=>({}));
      S.designStep='done';S.designOrderNo=d.orderNo||'';
      clearDsFormData();
    }else{const d=await res.json().catch(()=>({}));S.designError=d.error||'送出失敗，請稍後再試';}
  }catch(e){S.designError='連線失敗，請稍後再試';}
  S.designSubmitting=false;render();
}

      <p style="font-size:.85rem;color:rgba(255,255,255,.55);line-height:1.7;margin-bottom:1.25rem">我們已收到您的問題回報，<br>將盡快確認並修復。</p>
      <button onclick="closeBugReport()" style="padding:.6rem 2rem;border-radius:.65rem;background:linear-gradient(135deg,#f87171,#ef4444);color:#fff;border:none;cursor:pointer;font-weight:700;font-size:.9rem">關閉</button>

        <h3 style="font-weight:900;font-size:1rem;color:#f87171">🐛 回報問題</h3>
        <button onclick="closeBugReport()" style="font-size:1.5rem;color:rgba(255,255,255,.35);background:none;border:none;cursor:pointer;line-height:1">&times;</button>
      </div>
      <div style="margin-bottom:.85rem">
        <label class="form-label">遇到的問題描述 <span style="color:#f87171">*</span></label>
        <textarea class="inp" id="bugDesc" placeholder="請描述您遇到的問題，例如頁面錯誤、功能異常、顯示問題等…" rows="4" style="resize:vertical;min-height:100px">${esc(S._bugFormData?.description||'')}</textarea>

      </div>
      <div style="margin-bottom:1rem">
        <label class="form-label">您的聯繫方式（選填，方便我們回覆）</label>
        <input class="inp" id="bugContact" type="text" placeholder="MSG / DC / Email…" value="${esc(S._bugFormData?.contact||'')}"/>
      </div>
      ${S.bugReportError?`<div style="color:#f87171;font-size:.78rem;margin-bottom:.75rem;padding:.5rem .8rem;background:rgba(239,68,68,.1);border-radius:.5rem;border:1px solid rgba(239,68,68,.25)">${esc(S.bugReportError)}</div>`:''}
      <div style="display:flex;gap:.6rem;justify-content:flex-end">
        <button onclick="closeBugReport()" style="padding:.5rem 1rem;border-radius:.6rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.65);cursor:pointer;font-size:.85rem;font-weight:700">取消</button>
        <button onclick="submitBugReport()" style="padding:.5rem 1.2rem;border-radius:.6rem;background:linear-gradient(135deg,#f87171,#ef4444);color:#fff;border:none;cursor:pointer;font-size:.85rem;font-weight:700;opacity:${S.bugReportSubmitting?.6:1}"${S.bugReportSubmitting?' disabled':''}>

function openBugReport(){
  S.bugReportOpen=true;
  S.bugReportStep='form';
  S.bugReportError='';
  S.bugReportSubmitting=false;
  S._bugFormData={description:'',page:'',contact:''};
  document.body.style.overflow='hidden';
  render();
}
function closeBugReport(){
  S.bugReportOpen=false;
  document.body.style.overflow='';
  render();
}
async function submitBugReport(){
  const description=(document.getElementById('bugDesc')?.value||'').trim();
  const page=(document.getElementById('bugPage')?.value||'').trim();
  const contact=(document.getElementById('bugContact')?.value||'').trim();
  S._bugFormData={description,page,contact};
  if(!description){S.bugReportError='請填寫問題描述';render();return;}
  S.bugReportSubmitting=true;S.bugReportError='';render();
  try{
    const res=await fetch('/api/bug-reports',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({description,page,contact}),
    });
    const data=await res.json();
    if(!res.ok){S.bugReportSubmitting=false;S.bugReportError=data.error||'送出失敗，請稍後再試';render();return;}
    S.bugReportSubmitting=false;
    S.bugReportStep='done';
    render();
  }catch(e){
    S.bugReportSubmitting=false;
    S.bugReportError='網路錯誤，請稍後再試';
    render();
  }
}

function saveFormImages(){
  S.formImages.forEach((img,i)=>{
    const u=document.getElementById('f_img_url_'+i);

    if(u)img.url=u.value.trim();

function handleFormImageFile(input,i){
  const file=input.files[0];if(!file)return;
  if(file.size>5*1024*1024){alert('圖片大小不能超過 5MB');input.value='';return;}
  saveFormImages();
  _formImageFiles[i]=file;
  const reader=new FileReader();
  reader.onload=e=>{S.formImages[i].previewUrl=e.target.result;S.formImages[i].url=e.target.result;render();};
  reader.readAsDataURL(file);
}

function submitForm(){
  const g=id=>document.getElementById(id)?.value?.trim()||'';
  const isEdit=S.formMode==='edit';
  const title=g('f_title'),rank=g('f_rank'),skinCount=parseInt(g('f_skinCount')||'0');
  if(!title){S.formError='請填寫帳號標題';render();return}
  if(!skinCount&&skinCount!==0){S.formError='請填寫造型數';render();return}

  const baseData={
    title,rank,
    rankClass:rankClass(rank),
    heroCount:parseInt(g('f_heroCount')||'0'),
    skinCount,
    winRate:g('f_winRate')||'-',
    matches:parseInt(g('f_matches')||'0'),
    tags:[],
    isNew:document.getElementById('f_isNew')?.checked||false,
    sold:document.getElementById('f_sold')?.checked||false,
    contact:{},
    sellerId:S.currentUser?.id||'demo',
  };

  if(isEdit){
    // Edit mode: use f_price, f_cover, f_images as before
    const price=parseInt(g('f_price')||'0');
    const cover=g('f_cover');
    if(!price||price<1){S.formError='請填寫有效的售價';render();return}
    if(!cover){S.formError='請填寫封面圖片網址';render();return}
    const imagesRaw=g('f_images');
    const images=imagesRaw?imagesRaw.split('\n').map(s=>s.trim()).filter(Boolean):[cover];
    if(!images.includes(cover))images.unshift(cover);
    const idx=accountsData.findIndex(a=>a.id===S.formId);
    if(idx!==-1) accountsData[idx]={...accountsData[idx],...baseData,price,coverImage:cover,images};
  } else {
    // Add mode: batch — read dynamic image+price rows
    saveFormImages();
    const validRows=S.formImages.filter(img=>img.url&&img.price&&parseInt(img.price)>0);
    if(validRows.length===0){S.formError='請至少填寫一張圖片和售價';render();return}
    const invalidPrice=S.formImages.some(img=>img.url&&(!img.price||parseInt(img.price)<1));
    if(invalidPrice){S.formError='每張圖片都必須填寫有效的售價';render();return}
    validRows.forEach(row=>{
      const price=parseInt(row.price);
      const cover=row.url;
      accountsData.push({...baseData,id:nextId(),price,coverImage:cover,images:[cover],views:0});
    });
  }

  saveAccounts();
  S.formOpen=false;S.formError='';document.body.style.overflow='';render();
}

/* ── Fake discount algorithm ── */
function getDiscountInfo(accountId, price) {
  if (!siteSettings.discountEnabled) return null;
  // Deterministic pseudo-random based on account ID
  const seed = (accountId * 2654435761) >>> 0;
  const hash = (seed % 100);
  // Only some items get discounted (controlled by discountPerPage via rendering)
  const minPct = siteSettings.discountMinPct || 10;
  const maxPct = siteSettings.discountMaxPct || 30;
  const pctRange = maxPct - minPct;
  const markupPct = minPct + (hash % (pctRange + 1));
  const fakeOriginal = Math.round(price * (1 + markupPct / 100));
  return { fakeOriginal, discountPct: markupPct };
}

/* ── Price category ── */
function getPriceCategory(price) {
  const cats = siteSettings.categories || [];
  for (const cat of cats) {
    if (price >= cat.min && price <= cat.max) return cat;
  }
  return null;
}

/* ── Live viewer count ── */
let currentViewers = 0;
function updateViewerCount() {
  const base = siteSettings.viewerBase || 20;
  const range = siteSettings.viewerRange || 15;
  currentViewers = base + Math.floor(Math.random() * range);
}
updateViewerCount();
setInterval(updateViewerCount, 25000);

/* ── Total views (inflated) ── */
function getInflatedTotalViews() {
  const realViews = accountsData.reduce((s, a) => s + (a.views || 0), 0);
  const multi = siteSettings.totalViewsMultiplier || 3.2;
  return Math.round(realViews * multi);
}
