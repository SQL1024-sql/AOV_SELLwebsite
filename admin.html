<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>後台管理 — 傳說對決帳號</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans TC',system-ui,sans-serif;background:#07071A;color:#fff;min-height:100vh}
    .bg-grid{background-image:linear-gradient(rgba(255,215,0,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,215,0,.022) 1px,transparent 1px);background-size:52px 52px}
    .tg-gold{background:linear-gradient(135deg,#FFE57A,#FFD700,#FFA500);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    .glass{background:rgba(255,255,255,.045);backdrop-filter:blur(14px);border:1px solid rgba(255,215,0,.12);border-radius:1rem}

    /* ── Inputs ── */
    .inp{background:rgba(255,255,255,.06);border:1px solid rgba(255,215,0,.22);color:#fff;outline:none;transition:border-color .25s;border-radius:.6rem;width:100%;padding:.6rem .9rem;font-size:.875rem}
    .inp:focus{border-color:rgba(255,215,0,.6);box-shadow:0 0 0 3px rgba(255,215,0,.08)}
    .inp::placeholder{color:rgba(255,255,255,.28)}

    /* ── Buttons ── */
    .btn{cursor:pointer;font-weight:700;border:none;transition:all .18s;border-radius:.6rem;padding:.5rem 1rem;font-size:.82rem}
    .btn-gold{background:linear-gradient(135deg,#FFD700,#FFA500);color:#07071A}
    .btn-gold:hover{opacity:.85;transform:translateY(-1px)}
    .btn-outline{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7)}
    .btn-outline:hover{background:rgba(255,255,255,.12)}
    .btn-red{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#f87171}
    .btn-red:hover{background:rgba(239,68,68,.28)}
    .btn-green{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#4ade80}
    .btn-green:hover{background:rgba(34,197,94,.28)}
    .btn-blue{background:rgba(99,179,237,.15);border:1px solid rgba(99,179,237,.3);color:#63B3ED}
    .btn-blue:hover{background:rgba(99,179,237,.28)}

    /* ── Post card ── */
    .pcard{background:#0D0D26;border:1px solid rgba(255,255,255,.08);border-radius:.9rem;overflow:hidden;transition:border-color .2s,box-shadow .2s}
    .pcard:hover{border-color:rgba(255,215,0,.25);box-shadow:0 8px 30px rgba(255,215,0,.08)}
    .pcard-thumb{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}

    /* ── Modal ── */
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);z-index:80;display:flex;align-items:center;justify-content:center;padding:1rem}
    .modal-box{background:#0D0D26;border:1px solid rgba(255,215,0,.2);border-radius:1.1rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:1.5rem}

    /* ── Image upload zone ── */
    .upload-zone{border:2px dashed rgba(255,215,0,.25);border-radius:.75rem;padding:2rem;text-align:center;cursor:pointer;transition:border-color .2s,background .2s}
    .upload-zone:hover,.upload-zone.dragover{border-color:rgba(255,215,0,.6);background:rgba(255,215,0,.04)}
    .upload-zone input{display:none}

    /* ── Toast ── */
    #toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;transition:opacity .3s,transform .3s;opacity:0;transform:translateY(10px);pointer-events:none}
    #toast.show{opacity:1;transform:translateY(0)}

    /* ── Confirm dialog ── */
    .confirm-box{background:#0D0D26;border:1px solid rgba(239,68,68,.3);border-radius:1rem;padding:1.5rem;width:100%;max-width:360px;text-align:center}

    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:#07071A}
    ::-webkit-scrollbar-thumb{background:linear-gradient(#FFD700,#7B2FBE);border-radius:3px}
  </style>
</head>
<body class="bg-grid">

<!-- NAV -->
<nav style="background:rgba(7,7,26,.95);border-bottom:1px solid rgba(255,215,0,.1);position:sticky;top:0;z-index:50">
  <div style="max-width:1200px;margin:0 auto;padding:.65rem 1rem;display:flex;align-items:center;gap:.75rem">
    <a href="index.html" style="display:flex;align-items:center;gap:.55rem;text-decoration:none;flex-shrink:0">
      <div style="width:2.1rem;height:2.1rem;border-radius:.55rem;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:900;background:linear-gradient(135deg,#FFD700,#7B2FBE)">⚔</div>
      <div style="line-height:1.25">
        <div class="tg-gold" style="font-weight:900;font-size:.85rem">傳說對決</div>
        <div style="font-size:.62rem;color:rgba(255,255,255,.38)">帳號展示平台</div>
      </div>
    </a>
    <div style="flex:1;font-size:.9rem;font-weight:700;color:rgba(255,255,255,.45)">/ 後台管理</div>
    <a href="index.html" class="btn btn-outline" style="text-decoration:none;font-size:.78rem">← 回前台</a>
  </div>
</nav>

<!-- MAIN -->
<main style="max-width:1200px;margin:0 auto;padding:1.5rem 1rem 4rem">

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:.75rem">
    <div>
      <h1 style="font-size:1.35rem;font-weight:900">貼文管理</h1>
      <p style="font-size:.78rem;color:rgba(255,255,255,.38);margin-top:.2rem">共 <span id="totalCount" style="color:#FFD700;font-weight:700">0</span> 篇貼文</p>
    </div>
    <button class="btn btn-gold" onclick="openAddModal()" style="display:flex;align-items:center;gap:.4rem;font-size:.85rem;padding:.55rem 1.2rem">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
      新增貼文
    </button>
  </div>

  <!-- Posts Grid -->
  <div id="postsGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,240px),1fr));gap:1rem">
    <!-- filled by JS -->
  </div>

  <!-- Empty state -->
  <div id="emptyState" style="display:none;text-align:center;padding:6rem 0;color:rgba(255,255,255,.3)">
    <div style="font-size:3rem;margin-bottom:1rem">📭</div>
    <div style="font-size:1rem;font-weight:600">目前沒有任何貼文</div>
    <div style="font-size:.82rem;margin-top:.5rem">點擊「新增貼文」開始新增</div>
  </div>
</main>

<!-- ══ ADD / EDIT MODAL ══ -->
<div id="formModal" class="modal-backdrop" style="display:none" onclick="onBackdropClick(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem">
      <h2 id="modalTitle" style="font-size:1rem;font-weight:800">新增貼文</h2>
      <button onclick="closeModal()" style="background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:1.3rem;line-height:1" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,.4)'">✕</button>
    </div>

    <form id="postForm" onsubmit="handleSubmit(event)">
      <!-- Title -->
      <div style="margin-bottom:.9rem">
        <label style="display:block;font-size:.75rem;color:rgba(255,255,255,.5);margin-bottom:.35rem">帳號標題 <span style="color:#f87171">*</span></label>
        <input id="fTitle" class="inp" type="text" placeholder="例：傳說 高CP值帳號 全英雄解鎖" required maxlength="80"/>
      </div>

      <!-- Price -->
      <div style="margin-bottom:.9rem">
        <label style="display:block;font-size:.75rem;color:rgba(255,255,255,.5);margin-bottom:.35rem">售價 (NT$) <span style="color:#f87171">*</span></label>
        <div style="position:relative">
          <span style="position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.35);font-size:.85rem;pointer-events:none">NT$</span>
          <input id="fPrice" class="inp" type="number" placeholder="0" min="1" required style="padding-left:2.8rem"/>
        </div>
      </div>

      <!-- Image upload -->
      <div style="margin-bottom:1.1rem">
        <label style="display:block;font-size:.75rem;color:rgba(255,255,255,.5);margin-bottom:.35rem">封面圖片</label>
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fImage').click()" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
          <input type="file" id="fImage" accept="image/jpeg,image/png,image/gif,image/webp" onchange="onFileSelect(event)"/>
          <div id="uploadPrompt">
            <svg width="32" height="32" fill="none" stroke="rgba(255,215,0,.5)" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto .6rem"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
            <div style="font-size:.82rem;color:rgba(255,255,255,.45)">點擊或拖曳圖片至此</div>
            <div style="font-size:.72rem;color:rgba(255,255,255,.25);margin-top:.3rem">支援 JPG、PNG、GIF、WebP，最大 10MB</div>
          </div>
          <div id="uploadPreview" style="display:none">
            <img id="previewImg" style="max-height:160px;border-radius:.5rem;margin:0 auto;display:block"/>
            <div id="previewName" style="font-size:.75rem;color:rgba(255,255,255,.45);margin-top:.5rem"></div>
            <button type="button" onclick="clearImage(event)" style="margin-top:.5rem;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#f87171;border-radius:.4rem;padding:.2rem .65rem;cursor:pointer;font-size:.72rem">移除圖片</button>
          </div>
        </div>
        <!-- Current image hint (edit mode) -->
        <div id="currentImgHint" style="display:none;margin-top:.45rem;font-size:.72rem;color:rgba(255,255,255,.35)">
          目前圖片：<span id="currentImgName" style="color:rgba(255,215,0,.6)"></span>（不上傳則保留原圖）
        </div>
      </div>

      <!-- Error msg -->
      <div id="formError" style="display:none;color:#f87171;font-size:.78rem;margin-bottom:.75rem;padding:.5rem .8rem;background:rgba(239,68,68,.1);border-radius:.5rem;border:1px solid rgba(239,68,68,.25)"></div>

      <!-- Actions -->
      <div style="display:flex;gap:.6rem;justify-content:flex-end">
        <button type="button" class="btn btn-outline" onclick="closeModal()">取消</button>
        <button type="submit" class="btn btn-gold" id="submitBtn">
          <span id="submitText">新增貼文</span>
          <span id="submitLoading" style="display:none">處理中…</span>
        </button>
      </div>
    </form>
  </div>
</div>

<!-- ══ DELETE CONFIRM MODAL ══ -->
<div id="deleteModal" class="modal-backdrop" style="display:none" onclick="closeDeleteModal()">
  <div class="confirm-box" onclick="event.stopPropagation()">
    <div style="font-size:2rem;margin-bottom:.75rem">🗑️</div>
    <h3 style="font-size:1rem;font-weight:800;margin-bottom:.4rem">確認刪除</h3>
    <p style="font-size:.82rem;color:rgba(255,255,255,.5);margin-bottom:1.25rem">此操作無法復原，確定要刪除這篇貼文嗎？</p>
    <div style="display:flex;gap:.6rem;justify-content:center">
      <button class="btn btn-outline" onclick="closeDeleteModal()">取消</button>
      <button class="btn btn-red" id="confirmDeleteBtn" onclick="confirmDelete()">確認刪除</button>
    </div>
  </div>
</div>

<!-- ══ TOAST ══ -->
<div id="toast">
  <div id="toastInner" style="background:#1a1a3e;border:1px solid rgba(255,215,0,.2);border-radius:.7rem;padding:.6rem 1.1rem;font-size:.82rem;font-weight:600;display:flex;align-items:center;gap:.5rem;box-shadow:0 8px 30px rgba(0,0,0,.5)"></div>
</div>

<script>
/* ══════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════ */
let accounts = [];
let editId   = null;   // null = add mode, number = edit mode
let deleteId = null;

/* ══════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════ */
async function init() {
  await loadAccounts();
  renderGrid();
}

/* ══════════════════════════════════════════════════════
   API HELPERS
══════════════════════════════════════════════════════ */
async function loadAccounts() {
  try {
    const res = await fetch('/api/accounts');
    accounts = await res.json();
  } catch(e) {
    showToast('❌ 無法連接伺服器，請確認 server.js 已啟動', 'error');
    accounts = [];
  }
}

/* ══════════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════════ */
function renderGrid() {
  const grid  = document.getElementById('postsGrid');
  const empty = document.getElementById('emptyState');
  document.getElementById('totalCount').textContent = accounts.length;

  if (accounts.length === 0) {
    grid.style.display  = 'none';
    empty.style.display = 'block';
    return;
  }
  grid.style.display  = 'grid';
  empty.style.display = 'none';

  grid.innerHTML = accounts.map(acc => {
    const imgSrc = acc.imgNAME
      ? `/acc_img/${acc.imgNAME}`
      : 'https://placehold.co/800x600/0d0d26/555?text=No+Image';
    return `
    <div class="pcard">
      <div style="position:relative">
        <img class="pcard-thumb" src="${escH(imgSrc)}" alt="${escH(acc.title)}"
             onerror="this.src='https://placehold.co/800x600/0d0d26/555?text=No+Image'"/>
        <div style="position:absolute;top:.5rem;right:.5rem;background:rgba(7,7,26,.85);border-radius:.4rem;padding:.18rem .5rem;font-size:.68rem;color:rgba(255,255,255,.5)">
          ID: ${acc.id}
        </div>
      </div>
      <div style="padding:.85rem">
        <div style="font-size:.85rem;font-weight:700;line-height:1.45;color:#fff;margin-bottom:.5rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">
          ${escH(acc.title)}
        </div>
        <div style="font-size:1rem;font-weight:900;color:#FFD700;margin-bottom:.5rem">
          NT$ ${Number(acc.price).toLocaleString('zh-TW')}
        </div>
        ${acc.imgNAME ? `<div style="font-size:.68rem;color:rgba(255,255,255,.3);margin-bottom:.75rem">🖼 ${escH(acc.imgNAME)}</div>` : `<div style="font-size:.68rem;color:rgba(255,255,255,.2);margin-bottom:.75rem">（無圖片）</div>`}
        <div style="display:flex;gap:.5rem">
          <button class="btn btn-blue" style="flex:1;font-size:.75rem" onclick="openEditModal(${acc.id})">✏️ 編輯</button>
          <button class="btn btn-red"  style="flex:1;font-size:.75rem" onclick="openDeleteModal(${acc.id})">🗑 刪除</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function escH(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ══════════════════════════════════════════════════════
   ADD MODAL
══════════════════════════════════════════════════════ */
function openAddModal() {
  editId = null;
  document.getElementById('modalTitle').textContent = '新增貼文';
  document.getElementById('submitText').textContent  = '新增貼文';
  document.getElementById('fTitle').value  = '';
  document.getElementById('fPrice').value  = '';
  document.getElementById('currentImgHint').style.display = 'none';
  clearImageState();
  clearError();
  document.getElementById('formModal').style.display = 'flex';
}

/* ══════════════════════════════════════════════════════
   EDIT MODAL
══════════════════════════════════════════════════════ */
function openEditModal(id) {
  const acc = accounts.find(a => a.id === id);
  if (!acc) return;
  editId = id;
  document.getElementById('modalTitle').textContent = '編輯貼文';
  document.getElementById('submitText').textContent  = '儲存變更';
  document.getElementById('fTitle').value = acc.title;
  document.getElementById('fPrice').value = acc.price;

  if (acc.imgNAME) {
    document.getElementById('currentImgName').textContent  = acc.imgNAME;
    document.getElementById('currentImgHint').style.display = 'block';
  } else {
    document.getElementById('currentImgHint').style.display = 'none';
  }
  clearImageState();
  clearError();
  document.getElementById('formModal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('formModal').style.display = 'none';
  clearImageState();
  clearError();
}
function onBackdropClick(e) { if (e.target === e.currentTarget) closeModal(); }

/* ══════════════════════════════════════════════════════
   IMAGE UPLOAD HANDLERS
══════════════════════════════════════════════════════ */
function onFileSelect(e) {
  const file = e.target.files[0];
  if (file) showPreview(file);
}
function onDragOver(e)  { e.preventDefault(); document.getElementById('uploadZone').classList.add('dragover'); }
function onDragLeave(e) { document.getElementById('uploadZone').classList.remove('dragover'); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && /^image\//i.test(file.type)) {
    const dt = new DataTransfer();
    dt.items.add(file);
    document.getElementById('fImage').files = dt.files;
    showPreview(file);
  }
}
function showPreview(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('previewImg').src = ev.target.result;
    document.getElementById('previewName').textContent = file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)';
    document.getElementById('uploadPrompt').style.display  = 'none';
    document.getElementById('uploadPreview').style.display = 'block';
  };
  reader.readAsDataURL(file);
}
function clearImage(e) {
  if (e) e.stopPropagation();
  clearImageState();
}
function clearImageState() {
  document.getElementById('fImage').value = '';
  document.getElementById('uploadPrompt').style.display  = 'block';
  document.getElementById('uploadPreview').style.display = 'none';
}

/* ══════════════════════════════════════════════════════
   FORM SUBMIT
══════════════════════════════════════════════════════ */
async function handleSubmit(e) {
  e.preventDefault();
  clearError();

  const title = document.getElementById('fTitle').value.trim();
  const price = document.getElementById('fPrice').value.trim();
  const file  = document.getElementById('fImage').files[0];

  if (!title) { showError('請填寫帳號標題'); return; }
  if (!price || Number(price) <= 0) { showError('請填寫有效售價'); return; }

  setLoading(true);
  const fd = new FormData();
  fd.append('title', title);
  fd.append('price', price);
  if (file) fd.append('image', file);

  try {
    let res;
    if (editId === null) {
      res = await fetch('/api/accounts', { method: 'POST', body: fd });
    } else {
      res = await fetch(`/api/accounts/${editId}`, { method: 'PUT', body: fd });
    }
    const data = await res.json();
    if (!res.ok) { showError(data.error || '操作失敗'); return; }

    closeModal();
    await loadAccounts();
    renderGrid();
    showToast(editId === null ? '✅ 貼文新增成功！' : '✅ 貼文已更新！', 'success');
  } catch(err) {
    showError('連線錯誤，請確認伺服器已啟動');
  } finally {
    setLoading(false);
  }
}

function setLoading(on) {
  document.getElementById('submitBtn').disabled   = on;
  document.getElementById('submitText').style.display    = on ? 'none'   : 'inline';
  document.getElementById('submitLoading').style.display = on ? 'inline' : 'none';
}
function showError(msg) {
  const el = document.getElementById('formError');
  el.textContent    = msg;
  el.style.display  = 'block';
}
function clearError() {
  const el = document.getElementById('formError');
  el.style.display = 'none';
  el.textContent   = '';
}

/* ══════════════════════════════════════════════════════
   DELETE
══════════════════════════════════════════════════════ */
function openDeleteModal(id) {
  deleteId = id;
  document.getElementById('deleteModal').style.display = 'flex';
}
function closeDeleteModal() {
  deleteId = null;
  document.getElementById('deleteModal').style.display = 'none';
}
async function confirmDelete() {
  if (deleteId === null) return;
  const btn = document.getElementById('confirmDeleteBtn');
  btn.disabled = true;
  btn.textContent = '刪除中…';
  try {
    const res = await fetch(`/api/accounts/${deleteId}`, { method: 'DELETE' });
    if (!res.ok) { const d = await res.json(); showToast('❌ ' + (d.error || '刪除失敗'), 'error'); return; }
    closeDeleteModal();
    await loadAccounts();
    renderGrid();
    showToast('🗑️ 貼文已刪除', 'info');
  } catch(e) {
    showToast('❌ 連線錯誤', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '確認刪除';
  }
}

/* ══════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════ */
let toastTimer;
function showToast(msg, type = 'success') {
  clearTimeout(toastTimer);
  const inner = document.getElementById('toastInner');
  const colors = { success: 'rgba(34,197,94,.25)', error: 'rgba(239,68,68,.25)', info: 'rgba(99,179,237,.25)' };
  const borders = { success: 'rgba(34,197,94,.35)', error: 'rgba(239,68,68,.35)', info: 'rgba(99,179,237,.35)' };
  inner.style.background   = colors[type]  || colors.info;
  inner.style.borderColor  = borders[type] || borders.info;
  inner.textContent = msg;
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
}

init();
